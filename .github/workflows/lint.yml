name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint > eslint-report.txt 2>&1 || true
        continue-on-error: true

      - name: Run Stylelint
        run: npm run lint:css > stylelint-report.txt 2>&1 || true
        continue-on-error: true

      - name: Summarize ESLint issues
        if: always()
        run: |
          echo "## :mag: ESLint Report" >> "$GITHUB_STEP_SUMMARY"

          if [ -s eslint-report.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details open><summary>Issues found — click to collapse (first 120 lines)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            head -n 120 eslint-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":white_check_mark: **No ESLint issues found**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize Stylelint issues
        if: always()
        run: |
          echo "## :nail_care: Stylelint Report" >> "$GITHUB_STEP_SUMMARY"

          if [ -s stylelint-report.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details open><summary>Issues found — click to collapse (first 120 lines)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            head -n 120 stylelint-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":white_check_mark: **No Stylelint issues found**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Optional debug step – remove once confirmed working
      - name: Show generated job summary (debug)
        if: always()
        run: |
          echo "=== Job summary preview ==="
          cat "$GITHUB_STEP_SUMMARY" || echo "(summary file is empty)"