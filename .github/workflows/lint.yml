name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # We use '|| true' to ensure the workflow continues to the summary steps
      - name: Run ESLint
        run: npm run lint > eslint-report.txt 2>&1 || true

      - name: Run Stylelint
        run: npm run lint:css > stylelint-report.txt 2>&1 || true

      - name: Summarize ESLint issues
        if: always()
        run: |
          touch eslint-report.txt
          {
            echo "## :mag: ESLint Report"
            echo "<details><summary>Click to expand ESLint Output (Max 100 lines)</summary>"
            echo ""
            echo "```text"
            if [ -s eslint-report.txt ]; then
              head -n 100 eslint-report.txt
            else
              echo "No ESLint output detected (Check if the command ran correctly)."
            fi
            echo "```"
            echo "</details>"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

      - name: Summarize Stylelint issues
        if: always()
        run: |
          touch stylelint-report.txt
          {
            echo "## :nail_care: Stylelint Report"
            echo "<details><summary>Click to expand Stylelint Output (Max 100 lines)</summary>"
            echo ""
            echo "```text"
            if [ -s stylelint-report.txt ]; then
              head -n 100 stylelint-report.txt
            else
              echo "No Stylelint output detected (Check if the command ran correctly)."
            fi
            echo "```"
            echo "</details>"
            echo ""
          } >> $GITHUB_STEP_SUMMARY