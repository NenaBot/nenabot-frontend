name: Lint

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci


      - name: Run ESLint
        run: npm run lint > eslint-report.txt || true
        continue-on-error: true

      - name: Add ESLint results to summary
        if: always()
        run: |
          echo '### ESLint Results' >> $GITHUB_STEP_SUMMARY
          cat eslint-report.txt >> $GITHUB_STEP_SUMMARY

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,css,md}" > prettier-report.txt || true

      - name: Add Prettier results to summary
        if: always()
        run: |
          echo '### Prettier Results' >> $GITHUB_STEP_SUMMARY
          cat prettier-report.txt >> $GITHUB_STEP_SUMMARY
