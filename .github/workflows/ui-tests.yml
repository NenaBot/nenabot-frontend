name: Run UI Tests

on:
  push:
    branches: [main, feat/ci-frontend-enhancements]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ui-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        id: run_ui_tests
        shell: bash
        run: |
          set +e
          npm run test:ui 2>&1 | tee ui-test-output.txt
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            echo "status_label=PASSED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=✅" >> "$GITHUB_OUTPUT"
          else
            echo "status_label=FAILED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=❌" >> "$GITHUB_OUTPUT"
          fi

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build UI test summary
        if: always()
        shell: bash
        env:
          STATUS_LABEL: ${{ steps.run_ui_tests.outputs.status_label }}
          STATUS_EMOJI: ${{ steps.run_ui_tests.outputs.status_emoji }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## 🎭 UI Test Report"
            echo
            echo "${STATUS_EMOJI} **Status: ${STATUS_LABEL}**"
            echo
            echo "- Workflow run: [Open run details](${RUN_URL})"
            echo "- Job summary: open the run link above, then expand the ui-tests job"
            echo
            echo "<details>"
            echo "<summary>📋 Show executed tests and raw output</summary>"
            echo
            echo '```text'
            if [ -f ui-test-output.txt ]; then
              sed -E 's/\x1b\[[0-9;]*m//g' ui-test-output.txt | tail -n 500
            else
              echo "No test output file was generated."
            fi
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with UI test status
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          STATUS_LABEL: ${{ steps.run_ui_tests.outputs.status_label }}
          STATUS_EMOJI: ${{ steps.run_ui_tests.outputs.status_emoji }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- ci-report-ui-tests -->';
            const body = `${marker}
            ## 🎭 UI Tests ${process.env.STATUS_EMOJI} ${process.env.STATUS_LABEL}

            - Result: **${process.env.STATUS_LABEL}**
            - Job summary: [Open workflow run](${process.env.RUN_URL}) and expand the **ui-tests** job
            - Trigger: ${context.eventName}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Fail workflow if UI tests failed
        if: always() && steps.run_ui_tests.outputs.exit_code != '0'
        run: exit 1
