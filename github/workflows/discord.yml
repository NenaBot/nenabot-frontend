name: Discord PR Notifications

on:
  pull_request:
    types:
      - opened
      - review_requested
      - closed

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    environment: DISCORD_WEBHOOK
    steps:
      - name: Normalize Discord webhook URL
        id: discord_webhook
        shell: bash
        env:
          RAW_DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [[ -z "$RAW_DISCORD_WEBHOOK" ]]; then
            echo "DISCORD_WEBHOOK secret is empty or unavailable in this event context."
            exit 1
          fi

          clean_webhook="${RAW_DISCORD_WEBHOOK%/github}"
          echo "::add-mask::$clean_webhook"
          echo "url=$clean_webhook" >> "$GITHUB_OUTPUT"

      - name: Notify PR opened
        if: github.event.action == 'opened'
        env:
          DISCORD_WEBHOOK: ${{ steps.discord_webhook.outputs.url }}
        uses: Ilshidur/action-discord@ad5235de713df3ef38022185499b02ffe93b7efe
        with:
          args: '@here [PR OPENED] #{{ EVENT_PAYLOAD.pull_request.number }} by @{{ EVENT_PAYLOAD.pull_request.user.login }} - {{ EVENT_PAYLOAD.pull_request.title }} {{ EVENT_PAYLOAD.pull_request.html_url }}'

      - name: Notify review requested (user)
        if: github.event.action == 'review_requested' && github.event.requested_reviewer != null
        env:
          DISCORD_WEBHOOK: ${{ steps.discord_webhook.outputs.url }}
        uses: Ilshidur/action-discord@ad5235de713df3ef38022185499b02ffe93b7efe
        with:
          args: '@here [REVIEW REQUESTED] from @{{ EVENT_PAYLOAD.requested_reviewer.login }} on PR #{{ EVENT_PAYLOAD.pull_request.number }} - {{ EVENT_PAYLOAD.pull_request.title }} {{ EVENT_PAYLOAD.pull_request.html_url }}'

      - name: Notify review requested (team)
        if: github.event.action == 'review_requested' && github.event.requested_team != null
        env:
          DISCORD_WEBHOOK: ${{ steps.discord_webhook.outputs.url }}
        uses: Ilshidur/action-discord@ad5235de713df3ef38022185499b02ffe93b7efe
        with:
          args: '@here [REVIEW REQUESTED] from @team:{{ EVENT_PAYLOAD.requested_team.name }} on PR #{{ EVENT_PAYLOAD.pull_request.number }} - {{ EVENT_PAYLOAD.pull_request.title }} {{ EVENT_PAYLOAD.pull_request.html_url }}'

      - name: Notify PR merged
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK: ${{ steps.discord_webhook.outputs.url }}
        uses: Ilshidur/action-discord@ad5235de713df3ef38022185499b02ffe93b7efe
        with:
          args: '@here [PR MERGED] #{{ EVENT_PAYLOAD.pull_request.number }} by @{{ EVENT_PAYLOAD.pull_request.user.login }} - {{ EVENT_PAYLOAD.pull_request.title }} {{ EVENT_PAYLOAD.pull_request.html_url }}'
